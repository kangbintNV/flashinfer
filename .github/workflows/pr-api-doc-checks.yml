name: PR Documentation Checks

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write # Test-only: validates visible reporting on PR #5.

jobs:
  documentation:
    name: Public API and documentation
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Check public API signature and export changes
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -o pipefail
          python scripts/check_pr_api_diff.py \
            --base "$BASE_SHA" \
            --head "$HEAD_SHA" \
            --github-actions \
            --report-json reports/public-api.json | tee api-doc-check.txt
          cat api-doc-check.txt >> "$GITHUB_STEP_SUMMARY"

      - name: Check all new static documentation drift
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -o pipefail
          python scripts/check_pr_document.py \
            --base "$BASE_SHA" \
            --head "$HEAD_SHA" \
            --github-actions \
            --strict \
            --report-json reports/static-documentation.json | tee static-doc-check.txt
          cat static-doc-check.txt >> "$GITHUB_STEP_SUMMARY"

      - name: Upload documentation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-documentation-report
          path: reports/*.json
          retention-days: 1

      - name: Post test-only documentation summary
        if: always()
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- flashinfer-pr-documentation-summary-test -->';
            const findings = [];
            for (const file of ['reports/public-api.json', 'reports/static-documentation.json']) {
              if (!fs.existsSync(file)) continue;
              const report = JSON.parse(fs.readFileSync(file, 'utf8'));
              findings.push(...(report.findings || []));
            }
            const unique = new Map();
            for (const finding of findings) unique.set(`${finding.path}:${finding.line}:${finding.message}`, finding);
            const rows = [...unique.values()].slice(0, 20);
            const body = `${marker}\n## Documentation checks (test) ${rows.length ? '⚠️' : '✅'}\n\n` +
              (rows.length
                ? rows.map((f) => `- \`${f.path}:${f.line || 1}\` — ${f.message}`).join('\n')
                : 'No new API or documentation drift was introduced by this PR.') +
              `\n\n[Test run](${process.env.RUN_URL})`;
            const { owner, repo } = context.repo;
            const issue_number = Number(process.env.PR_NUMBER);
            const comments = await github.paginate(github.rest.issues.listComments, { owner, repo, issue_number, per_page: 100 });
            const old = comments.find((comment) => comment.body.includes(marker));
            if (old) await github.rest.issues.updateComment({ owner, repo, comment_id: old.id, body });
            else await github.rest.issues.createComment({ owner, repo, issue_number, body });

      - name: Post test-only inline documentation findings
        if: always()
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        with:
          script: |
            const fs = require('fs');
            const marker = 'flashinfer-pr-documentation-inline-test';
            const findings = [];
            for (const file of ['reports/public-api.json', 'reports/static-documentation.json']) {
              if (!fs.existsSync(file)) continue;
              const report = JSON.parse(fs.readFileSync(file, 'utf8'));
              findings.push(...(report.findings || []));
            }
            const { owner, repo } = context.repo;
            const pull_number = Number(process.env.PR_NUMBER);
            const existing = await github.paginate(github.rest.pulls.listReviewComments, {
              owner, repo, pull_number, per_page: 100,
            });
            const existingKeys = new Set(
              existing
                .filter((comment) => comment.body.includes(marker))
                .map((comment) => comment.body.match(/<!-- key:(.*?) -->/)?.[1])
                .filter(Boolean),
            );
            const inline = [];
            for (const finding of findings) {
              const line = Number(finding.line);
              const path = String(finding.path || '');
              const key = [path, line, finding.message].join(':');
              if (!Number.isInteger(line) || line < 1 || !path || path.includes('..')) continue;
              if (!fs.existsSync(path) || !fs.statSync(path).isFile() || existingKeys.has(key)) continue;
              inline.push({
                path,
                line,
                side: 'RIGHT',
                body: `<!-- ${marker} --><!-- key:${key} -->\n⚠️ **Documentation check:** ${finding.message}`,
              });
            }
            if (!inline.length) return;
            await github.rest.pulls.createReview({
              owner,
              repo,
              pull_number,
              commit_id: process.env.PR_HEAD_SHA,
              event: 'COMMENT',
              body: `<!-- ${marker} -->\n## Documentation findings\n\nInline comments below are generated from the static documentation report. Findings without a concrete source line remain in the sticky PR summary.`,
              comments: inline,
            });
